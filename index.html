<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>三国雄心</title>
    <style>
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Noto Serif SC", "Songti SC", serif;
        background: #2a2418;
        color: #2c2416;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      button {
        padding: 0.35rem 0.65rem;
        border: 1px solid #8b7355;
        background: #ebe3d4;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.82rem;
      }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      button.active { background: #c9b896; font-weight: bold; }

      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        max-width: none;
        padding: 0;
      }

      #top-bar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.5rem;
        background: #ebe3d4;
        border-bottom: 2px solid #8b7355;
        z-index: 20;
      }
      #top-bar .brand {
        font-weight: bold;
        font-size: 0.95rem;
        margin-right: 0.25rem;
      }
      #status { font-size: 0.82rem; flex: 1; min-width: 120px; }
      .top-group { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
      .top-sep { width: 1px; height: 1.2rem; background: #c9b896; margin: 0 0.15rem; }

      #alert-banner {
        flex: 0 0 auto;
        margin: 0;
        padding: 0.35rem 0.5rem;
        font-size: 0.85rem;
        border-bottom: 1px solid #8b7355;
        z-index: 19;
      }
      #alert-banner[hidden] { display: none; }
      #alert-banner[data-type="info"] { background: #e8eef5; color: #2c3e50; }
      #alert-banner[data-type="warn"] { background: #fff3cd; color: #7a4f01; }
      #alert-banner[data-type="battle"] { background: #fde8e8; color: #8b0000; }
      #alert-banner[data-type="success"] { background: #e8f5e9; color: #1b5e20; }

      #map-stage {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
        background: #1a1610;
      }
      #map-viewport {
        width: 100%;
        height: 100%;
        overflow: auto;
        background: #e8e0d0;
        -webkit-overflow-scrolling: touch;
        cursor: grab;
        display: flex;
        justify-content: center;
      }
      #map-viewport:active { cursor: grabbing; }
      #map-stack {
        position: relative;
        display: inline-block;
      }
      #map {
        display: block;
        width: 600px;
        height: 600px;
      }
      #label-layer {
        position: absolute;
        left: 0;
        top: 0;
        width: 600px;
        height: 600px;
        pointer-events: none;
        z-index: 1;
      }
      .map-city-label {
        position: absolute;
        transform: translate(-50%, -50%);
        color: #1a1208;
        font-family: "Noto Serif SC", serif;
        white-space: nowrap;
        text-shadow:
          1px 1px 0 #f4efe4,
          -1px -1px 0 #f4efe4,
          1px -1px 0 #f4efe4,
          -1px 1px 0 #f4efe4;
        pointer-events: none;
      }
      .map-city-label--mega { font-size: 15px; font-weight: 700; }
      .map-city-label--large { font-size: 14px; font-weight: 600; }
      .map-city-label--small { font-size: 13px; font-weight: 500; }

      #action-bar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        padding: 0.3rem 0.5rem;
        background: #ddd4c4;
        border-bottom: 1px solid #8b7355;
        z-index: 18;
      }
      #action-bar button { min-width: 3.5rem; }
      #btn-player-faction {
        font-weight: bold;
        min-width: 2.5rem;
        background: #c9b896;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 0.35rem;
        margin: 0.5rem 0;
      }
      .slot-btn {
        min-height: 2rem;
        font-size: 0.75rem;
        padding: 0.25rem;
      }
      .nation-section { margin-bottom: 0.75rem; }
      .nation-section h4 { margin: 0.35rem 0; font-size: 0.9rem; }

      .diplomacy-dialog, .nation-dialog {
        background: #ebe3d4;
        border: 2px solid #8b7355;
        padding: 1rem;
        min-width: 260px;
        max-width: 90vw;
      }
      .diplomacy-actions, .nation-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
      .diplomacy-backdrop, .nation-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      #diplomacy-modal[hidden], #nation-panel[hidden] { display: none; }

      .action-panel-hint { font-size: 0.85rem; color: #5c4f3a; margin: 0.5rem 0; }
      .action-placeholder { font-size: 0.85rem; color: #5c4f3a; padding: 0.5rem 0; }

      #encyclopedia-content {
        max-height: min(62vh, 520px);
        overflow-y: auto;
        padding-right: 0.25rem;
        font-size: 0.85rem;
        line-height: 1.55;
        -webkit-user-select: text;
        user-select: text;
      }
      .encyclopedia-intro {
        margin: 0 0 0.85rem;
        padding: 0.5rem 0.65rem;
        background: #e8dcc8;
        border-left: 3px solid #8b7355;
        color: #4a3f2e;
      }
      .encyclopedia-section { margin-bottom: 1rem; }
      .encyclopedia-section h3 {
        margin: 0 0 0.35rem;
        font-size: 0.95rem;
        color: #6b2a2a;
        border-bottom: 1px solid #c9b896;
        padding-bottom: 0.2rem;
      }
      .encyclopedia-section h4 {
        margin: 0.55rem 0 0.2rem;
        font-size: 0.88rem;
        color: #4a3f2e;
      }
      .encyclopedia-section p {
        margin: 0.3rem 0;
        color: #3a3228;
      }
      .encyclopedia-section ul {
        margin: 0.25rem 0 0.35rem 1.15rem;
        padding: 0;
      }
      .encyclopedia-section li { margin: 0.2rem 0; }
      #counter-layer {
        position: absolute;
        left: 0;
        top: 0;
        width: 600px;
        height: 600px;
        pointer-events: none;
        z-index: 2;
      }
      .map-counter {
        position: absolute;
        width: 56px;
        height: 26px;
        box-sizing: border-box;
        border: 1px solid #2a2010;
        display: flex;
        pointer-events: auto;
        cursor: pointer;
        opacity: 0.94;
      }
      .map-counter--own { background: #2d7a4f; }
      .map-counter--ally { background: #3a6ea8; }
      .map-counter--neutral { background: #7a7570; }
      .map-counter--enemy { background: #b33a3a; }
      .map-counter--selected {
        border: 2px solid #ffd700;
        box-shadow: 0 0 4px rgba(255, 215, 0, 0.6);
      }
      .map-counter-left {
        width: 24%;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }
      .map-counter-left-top,
      .map-counter-left-bottom {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
      }
      .map-counter-left-top {
        border-bottom: 1px solid rgba(0, 0, 0, 0.12);
      }
      .map-counter-unit-icon {
        width: 12px;
        height: 12px;
        object-fit: contain;
        pointer-events: none;
      }
      .map-counter-faction-icon {
        width: 14px;
        height: 8px;
        object-fit: fill;
        pointer-events: none;
      }
      .map-counter-mid {
        flex: 1;
        padding: 1px 3px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 1px;
        min-width: 0;
      }
      .map-counter-count {
        color: #1a1208;
        font-family: ui-monospace, monospace;
        font-weight: bold;
        font-size: 9px;
        line-height: 1;
      }
      .map-counter-bar-track {
        height: 3px;
        background: rgba(0, 0, 0, 0.25);
        border-radius: 1px;
        overflow: hidden;
      }
      .map-counter-bar-fill {
        height: 100%;
        border-radius: 1px;
      }
      .map-counter-bar-fill--org { background: #4a7c59; }
      .map-counter-bar-fill--equip { background: #6a5a8a; }
      .map-counter-right {
        width: 14%;
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .map-counter-trench {
        width: 8px;
        height: 8px;
        border: 1.5px solid #e8dcc8;
        border-radius: 50%;
        box-sizing: border-box;
      }
      .map-counter-trench--filled {
        background: #e8dcc8;
        border-color: #e8dcc8;
      }
      .map-counter-status {
        position: absolute;
        top: 1px;
        right: 10px;
        color: #8b0000;
        font-family: ui-monospace, monospace;
        font-weight: bold;
        font-size: 7px;
        line-height: 1;
      }

      #tile-float {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        width: min(280px, 42vw);
        padding: 0.5rem 0.65rem;
        background: rgba(244, 239, 228, 0.94);
        border: 1px solid #8b7355;
        border-radius: 4px;
        font-size: 0.82rem;
        z-index: 12;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
      #tile-float h4 { margin: 0 0 0.35rem; font-size: 0.85rem; }
      #tile-float-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem; }

      #counter-stack-float {
        position: absolute;
        top: 7.5rem;
        right: 0.5rem;
        width: min(280px, 42vw);
        max-height: 40%;
        overflow: auto;
        padding: 0.5rem 0.65rem;
        background: rgba(244, 239, 228, 0.96);
        border: 1px solid #8b7355;
        border-radius: 4px;
        font-size: 0.82rem;
        z-index: 13;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      #counter-stack-float[hidden] { display: none; }
      .counter-stack-float-title { font-weight: bold; margin-bottom: 0.35rem; }
      .counter-stack-float-close {
        float: right;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 0.9rem;
        color: #5c4f3a;
      }
      .counter-stack-item {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
        margin-bottom: 0.3rem;
        padding: 0.35rem 0.45rem;
        border: 1px solid #c9b896;
        background: #e8e0d0;
        cursor: pointer;
        text-align: left;
      }
      .counter-stack-item--active {
        border-color: #ffd700;
        background: #f5efd8;
      }
      .counter-stack-item-name { font-weight: bold; font-size: 0.82rem; }
      .counter-stack-item-meta { font-size: 0.75rem; color: #5c4f3a; margin-top: 0.1rem; }

      #corps-float {
        position: absolute;
        top: 0.5rem;
        left: 0.5rem;
        width: min(300px, 46vw);
        max-height: 45%;
        overflow: auto;
        padding: 0.5rem 0.65rem;
        background: rgba(244, 239, 228, 0.96);
        border: 1px solid #8b7355;
        border-radius: 4px;
        z-index: 13;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      #corps-float[hidden] { display: none; }
      .corps-float-title { font-weight: bold; margin-bottom: 0.35rem; }
      .corps-float-section { margin-bottom: 0.5rem; font-size: 0.82rem; }
      .corps-float-hint { margin: 0.25rem 0 0; color: #5c4f3a; font-size: 0.78rem; }
      .corps-float-btn { margin-top: 0.25rem; }
      .battalion-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: 0.25rem; }
      .battalion-tags .tag {
        padding: 0.15rem 0.4rem;
        background: #e0d6c4;
        border: 1px solid #c9b896;
        font-size: 0.75rem;
      }
      .battalion-tags .tag.muted { opacity: 0.5; }
      .corps-float-close {
        float: right;
        padding: 0.1rem 0.4rem;
        font-size: 0.75rem;
      }
      .corps-battalion-tag {
        cursor: pointer;
        border: 1px solid #c9b896;
        background: #e0d6c4;
      }
      .corps-battalion-tag:hover { background: #d4c8b0; }

      #battalion-float {
        position: absolute;
        top: 0.5rem;
        left: min(320px, 48vw);
        width: min(340px, 50vw);
        max-height: 50%;
        overflow: auto;
        padding: 0.5rem 0.65rem;
        background: rgba(244, 239, 228, 0.96);
        border: 1px solid #8b7355;
        border-radius: 4px;
        z-index: 14;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      #battalion-float[hidden] { display: none; }
      .battalion-float-title { font-weight: bold; margin-bottom: 0.35rem; }
      .battalion-float-close {
        float: right;
        padding: 0.1rem 0.4rem;
        font-size: 0.75rem;
      }
      .battalion-detail-layout {
        display: flex;
        gap: 0.5rem;
        font-size: 0.82rem;
      }
      .century-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.25rem;
        flex: 1;
      }
      .century-block {
        padding: 0.25rem;
        text-align: center;
        border: 1px solid #c9b896;
        font-size: 0.75rem;
      }
      .century-block.full { background: #6b8e5a; color: #fff; }
      .century-block.partial { background: #d4a84b; }
      .century-block.empty { background: #ccc; opacity: 0.6; }
      .century-cap { font-size: 0.65rem; opacity: 0.85; }
      .battalion-stats p { margin: 0.2rem 0; }

      #bottom-dock {
        flex: 0 0 auto;
        background: #ebe3d4;
        border-top: 2px solid #8b7355;
        z-index: 20;
      }
      #dock-body {
        display: flex;
        flex-direction: row;
        align-items: stretch;
        gap: 0.6rem;
        padding: 0.5rem;
        min-height: 56px;
      }

      #minimap-panel {
        flex: 0 0 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
        padding: 0.4rem;
        border: 1px solid #8b7355;
        border-radius: 4px;
        background: #f4efe4;
      }
      #minimap-panel span { font-size: 0.72rem; color: #5c4f3a; }
      #minimap {
        border: 1px solid #8b7355;
        cursor: crosshair;
        display: block;
      }

      #corps-panel {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        padding: 0.4rem 0.5rem;
        border: 1px solid #8b7355;
        border-bottom: none;
        border-radius: 4px 4px 0 0;
        background: #f4efe4;
      }
      #corps-panel .corps-hint {
        font-size: 0.72rem;
        color: #5c4f3a;
        margin-bottom: 0.25rem;
        text-align: center;
      }
      #corps-grid {
        display: flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        overflow-x: auto;
      }
      .corps-bar-track {
        display: flex;
        flex-direction: row;
        flex-wrap: nowrap;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
      }
      .corps-btn {
        white-space: pre-line;
        text-align: center;
        min-width: 5.5rem;
        min-height: 2.4rem;
        font-size: 0.72rem;
        line-height: 1.2;
      }
      .corps-btn-new { background: #d4c4a8; font-weight: bold; }
      .corps-btn-standby { background: #e8dcc8; }
      .corps-btn-standby.selected {
        outline: 2px solid #8b3a3a;
        background: #dcc8a8;
      }
      .corps-btn-ag {
        background: #c4d4e8;
        font-weight: bold;
        min-width: 6.5rem;
        min-height: 2.8rem;
        font-size: 0.78rem;
      }
      .corps-btn-ag.selected { outline: 2px solid #2d4a6c; background: #a8c0dc; }
      .corps-btn-ag-new { background: #b8c8dc; }

      #policy-tree { display: flex; flex-direction: column; gap: 0.35rem; }
      .policy-tree-tier { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; }
      .policy-tree-node {
        border: 1px solid #8b7355;
        background: #ebe3d4;
        padding: 0.4rem 0.5rem;
        min-width: 7rem;
        text-align: center;
        font-size: 0.78rem;
      }
      .policy-tree-node.owned { background: #d4e8d4; border-color: #4a7c59; }
      .policy-tree-node.locked { opacity: 0.55; }
      .policy-node-name { font-weight: bold; }
      .policy-node-cost { color: #5c4f3a; font-size: 0.72rem; }
      .policy-node-req { color: #8b3a3a; font-size: 0.68rem; }
      .policy-tree-connector { text-align: center; color: #8b7355; font-size: 0.85rem; }
      .policy-node-btn { margin-top: 0.25rem; width: 100%; font-size: 0.72rem; }

      #army-group-float {
        position: absolute;
        top: 0.5rem;
        left: min(320px, 48vw);
        width: min(300px, 46vw);
        max-height: 45%;
        overflow: auto;
        padding: 0.5rem 0.65rem;
        background: rgba(244, 239, 228, 0.96);
        border: 1px solid #5a6a8a;
        border-radius: 4px;
        z-index: 13;
        box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      }
      #army-group-float[hidden] { display: none; }

      #army-group-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.45);
      }
      #army-group-modal[hidden] { display: none; }
      #army-group-modal .ag-dialog {
        background: #f4efe4;
        border: 2px solid #8b7355;
        padding: 1rem;
        max-width: 360px;
        width: 90%;
      }
      .ag-pick-item { display: block; margin: 0.25rem 0; font-size: 0.82rem; }

      #corps-command-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem;
        padding: 0.35rem 0.4rem;
        margin-bottom: 0.35rem;
        background: #d8ccb8;
        border: 1px solid #8b7355;
        border-radius: 3px;
      }
      #corps-command-bar[hidden] { display: none; }
      .corps-cmd-label {
        font-size: 0.75rem;
        font-weight: bold;
        margin-right: 0.25rem;
        color: #3d3020;
      }
      #corps-command-bar button {
        font-size: 0.72rem;
        padding: 0.2rem 0.45rem;
      }

      #layer-panel {
        flex: 0 0 auto;
        padding: 0.4rem;
        border: 1px solid #8b7355;
        border-radius: 4px;
        background: #f4efe4;
      }
      #layer-switcher {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        align-items: stretch;
      }
      #layer-switcher button { min-width: 4.5rem; }

      /* Modals */
      #modal-root[hidden] { display: none; }
      #modal-root {
        position: fixed;
        inset: 0;
        z-index: 200;
      }
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(20, 16, 10, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      .modal-dialog {
        background: #f4efe4;
        border: 2px solid #8b7355;
        border-radius: 6px;
        width: min(520px, 96vw);
        max-height: 85vh;
        display: flex;
        flex-direction: column;
      }
      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid #c9b896;
      }
      .modal-title { font-size: 1rem; margin: 0; }
      .modal-close { padding: 0.2rem 0.5rem; }
      .modal-body {
        padding: 0.75rem;
        overflow: auto;
        flex: 1;
      }
      .modal-panel[hidden] { display: none; }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: ui-monospace, monospace;
        font-size: 12px;
        padding: 0.75rem;
        height: min(50vh, 320px);
        overflow-y: auto;
        border-radius: 4px;
        white-space: pre-wrap;
        -webkit-user-select: text;
        user-select: text;
      }
      .modal-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-bottom: 0.5rem;
      }
      .modal-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
        margin-bottom: 0.5rem;
      }
      #policy-list-modal { display: flex; flex-wrap: wrap; gap: 0.35rem; }
      #events-panel { font-size: 0.82rem; line-height: 1.5; white-space: pre-wrap; }

      #faction-modal {
        position: fixed;
        inset: 0;
        background: rgba(20, 16, 10, 0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 300;
        padding: 1rem;
      }
      #faction-modal[hidden] { display: none; }
      .faction-dialog {
        background: #f4efe4;
        border: 2px solid #8b7355;
        border-radius: 6px;
        padding: 1.25rem;
        max-width: 520px;
        width: 100%;
      }
      .faction-dialog h2 { margin: 0 0 1rem; font-size: 1.1rem; text-align: center; }
      .faction-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      @media (max-width: 520px) {
        .faction-cards { grid-template-columns: 1fr; }
        #dock-body {
          flex-direction: column;
        }
        #layer-switcher { flex-direction: row; flex-wrap: wrap; }
      }
      .faction-card {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
        padding: 0.65rem;
        text-align: left;
        border: 2px solid #c9b896;
        background: #ebe3d4;
      }
      .faction-card.selected {
        border-color: #8b3a3a;
        background: #e8dcc8;
      }
      .faction-card .faction-name { font-size: 1.1rem; font-weight: bold; }
      .faction-card .faction-blurb { font-size: 0.78rem; color: #5c4f3a; }
      .faction-actions { display: flex; gap: 0.5rem; justify-content: center; }
    </style>
  </head>
  <body>
    <div id="app">
      <header id="top-bar">
        <button id="btn-player-faction" type="button">魏</button>
        <span class="brand">三国雄心 <span id="app-version">v0.7</span></span>
        <span id="status">加载中…</span>
        <div class="top-group">
          <button id="btn-pause" type="button">暂停</button>
          <button type="button" data-speed="1">×1</button>
          <button type="button" data-speed="2">×2</button>
          <button type="button" data-speed="5">×5</button>
          <span class="top-sep"></span>
          <button id="btn-save" type="button">存档</button>
          <button id="btn-load" type="button">读档</button>
          <button id="btn-new" type="button">新游戏</button>
          <span class="top-sep"></span>
          <button id="btn-modal-debug" type="button">调试</button>
          <button id="btn-modal-events" type="button">日志</button>
          <button id="btn-modal-encyclopedia" type="button">百科</button>
        </div>
      </header>

      <nav id="action-bar">
        <button id="btn-action-research" type="button">科研</button>
        <button id="btn-action-trade" type="button">贸易</button>
        <button id="btn-action-construction" type="button">建设</button>
        <button id="btn-action-production" type="button">生产</button>
        <button id="btn-action-recruitment" type="button">募兵</button>
      </nav>

      <div id="alert-banner" hidden></div>

      <main id="map-stage">
        <div id="map-viewport">
          <div id="map-stack">
            <canvas id="map" width="600" height="600"></canvas>
            <div id="label-layer"></div>
            <div id="counter-layer"></div>
          </div>
        </div>

        <div id="corps-float" hidden>
          <button type="button" class="corps-float-close">关闭</button>
          <div class="corps-float-title">将军队·待命</div>
          <div class="corps-float-body"></div>
        </div>

        <div id="army-group-float" hidden>
          <button type="button" class="army-group-float-close corps-float-close">关闭</button>
          <div class="army-group-float-title corps-float-title">集团军</div>
          <div class="army-group-float-body corps-float-body"></div>
        </div>

        <div id="battalion-float" hidden>
          <button type="button" class="battalion-float-close">关闭</button>
          <div class="battalion-float-title">编队详情</div>
          <div class="battalion-float-body"></div>
        </div>

        <div id="counter-stack-float" hidden>
          <button type="button" class="counter-stack-float-close">关闭</button>
          <div class="counter-stack-float-title">军棋编队</div>
          <div class="counter-stack-float-body"></div>
        </div>

        <aside id="tile-float">
          <h4 id="panel-tile">点击地图选择地块</h4>
          <div id="panel-army">—</div>
          <div id="tile-float-actions" hidden>
            <button id="btn-recruit" type="button" disabled hidden>募兵</button>
            <button id="btn-tuntian" type="button" disabled hidden>屯田</button>
          </div>
        </aside>
      </main>

      <footer id="bottom-dock">
        <div id="dock-body">
          <section id="minimap-panel">
            <canvas id="minimap" width="140" height="140"></canvas>
            <span>小地图</span>
          </section>
          <section id="corps-panel">
            <div id="corps-command-bar" hidden>
              <span class="corps-cmd-label">将军队</span>
              <button type="button" data-cmd="train">训练</button>
              <button type="button" data-cmd="defend">驻守筑壕</button>
              <button type="button" data-cmd="cancel-march">取消行军</button>
            </div>
            <div class="corps-hint">短按选中 · 右键/长按移动或外交 · 顶栏国名打开国策/谋士/军官</div>
            <div id="corps-grid"></div>
          </section>
          <section id="layer-panel">
            <div id="layer-switcher"></div>
          </section>
        </div>
      </footer>
    </div>

    <div id="modal-root" hidden>
      <div class="modal-backdrop">
        <div class="modal-dialog" role="dialog" aria-modal="true">
          <div class="modal-header">
            <h2 class="modal-title">面板</h2>
            <button type="button" class="modal-close">关闭</button>
          </div>
          <div class="modal-body">
            <div id="modal-debug" class="modal-panel" data-modal-title="调试" hidden>
              <div class="modal-toolbar">
                <button id="btn-log-clear" type="button">清空</button>
                <button id="btn-log-dump" type="button">打印详情</button>
                <button id="btn-log-copy" type="button">复制日志</button>
                <button id="btn-version-check" type="button">检查版本</button>
              </div>
              <div class="modal-filters">
                <button type="button" data-filter="tick" class="active">Tick</button>
                <button type="button" data-filter="tile" class="active">地块</button>
                <button type="button" data-filter="system" class="active">系统</button>
                <button type="button" data-filter="map" class="active">地图</button>
                <button type="button" data-filter="battle" class="active">战斗</button>
                <button type="button" data-filter="debug" class="active">详情</button>
              </div>
              <div id="log"></div>
            </div>
            <div id="modal-policies" class="modal-panel" data-modal-title="国策" hidden>
              <div id="policy-tree-host"></div>
            </div>
            <div id="modal-action-research" class="modal-panel" data-modal-title="科研" hidden>
              <p class="action-placeholder">科研系统筹备中。未来将解锁兵种升级与战术研究。</p>
            </div>
            <div id="modal-action-trade" class="modal-panel" data-modal-title="贸易" hidden>
              <p class="action-placeholder">贸易系统筹备中。未来将可与他国交换资源。</p>
            </div>
            <div id="modal-action-construction" class="modal-panel" data-modal-title="建设" hidden>
              <p id="action-construction-hint" class="action-panel-hint">请先在地图上选中己方地块</p>
              <button id="action-construction-run" type="button" disabled>建造屯田</button>
            </div>
            <div id="modal-action-production" class="modal-panel" data-modal-title="生产" hidden>
              <p class="action-placeholder">生产系统筹备中。未来将管理装备与军需制造。</p>
            </div>
            <div id="modal-action-recruitment" class="modal-panel" data-modal-title="募兵" hidden>
              <p id="action-recruitment-hint" class="action-panel-hint">请先在地图上选中己方地块</p>
              <button id="action-recruitment-run" type="button" disabled>执行募兵</button>
            </div>
            <div id="modal-events" class="modal-panel" data-modal-title="近期事件" hidden>
              <div id="events-panel">暂无</div>
            </div>
            <div id="modal-encyclopedia" class="modal-panel" data-modal-title="百科" hidden>
              <div id="encyclopedia-content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="diplomacy-modal" hidden>
      <div class="diplomacy-backdrop">
        <div class="diplomacy-dialog" role="dialog" aria-modal="true">
          <h3 class="diplomacy-title">外交</h3>
          <p class="diplomacy-status">—</p>
          <div class="diplomacy-actions">
            <button id="diplomacy-declare" type="button">宣战</button>
            <button id="diplomacy-cease" type="button">停战</button>
            <button type="button" class="diplomacy-close">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="nation-panel" hidden>
      <div class="nation-backdrop">
        <div class="nation-dialog" role="dialog" aria-modal="true">
          <h3 class="nation-title">国家</h3>
          <div class="nation-section">
            <button id="nation-open-policies" type="button">国策</button>
            <div id="nation-policy-tree" hidden></div>
          </div>
          <div class="nation-section">
            <h4>谋士团（7 槽）</h4>
            <div id="strategist-slots" class="slot-grid"></div>
          </div>
          <div class="nation-section">
            <h4>军官团（7 槽）</h4>
            <p style="font-size:0.75rem;color:#5c4f3a;margin:0 0 0.35rem">将领可同时领兵</p>
            <div id="officer-slots" class="slot-grid"></div>
          </div>
          <div class="nation-actions">
            <button type="button" class="nation-close">关闭</button>
          </div>
        </div>
      </div>
    </div>

    <div id="policy-tree" hidden></div>

    <div id="army-group-modal" hidden>
      <div class="ag-dialog">
        <h3>组建集团军</h3>
        <p class="corps-float-hint">勾选 ≥2 个将军队（非待命、未在编）</p>
        <div id="army-group-pick-list"></div>
        <div class="faction-actions" style="margin-top:0.75rem">
          <button type="button" id="army-group-confirm" disabled>确认组建</button>
          <button type="button" id="army-group-cancel">取消</button>
        </div>
      </div>
    </div>

    <div id="faction-modal" hidden>
      <div class="faction-dialog" role="dialog" aria-modal="true">
        <h2 id="faction-modal-title">选择操控势力</h2>
        <div class="faction-cards">
          <button type="button" class="faction-card" data-faction-card="wei">
            <span class="faction-name">魏</span>
            <span class="faction-hero"></span>
            <span class="faction-capital"></span>
            <span class="faction-troops"></span>
            <span class="faction-blurb"></span>
          </button>
          <button type="button" class="faction-card" data-faction-card="shu">
            <span class="faction-name">蜀</span>
            <span class="faction-hero"></span>
            <span class="faction-capital"></span>
            <span class="faction-troops"></span>
            <span class="faction-blurb"></span>
          </button>
          <button type="button" class="faction-card" data-faction-card="wu">
            <span class="faction-name">吴</span>
            <span class="faction-hero"></span>
            <span class="faction-capital"></span>
            <span class="faction-troops"></span>
            <span class="faction-blurb"></span>
          </button>
        </div>
        <div class="faction-actions">
          <button id="faction-modal-cancel" type="button">取消</button>
          <button id="faction-modal-confirm" type="button">开始游戏</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
